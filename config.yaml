# Discord Bot
discord:
  token: "MTQ4NTA0Nzk3NjUzNDYxMDA4MA.Gm2uDq.jOooWkVA-K7Pjrj2O9zcSvry3FCgJd0XClBww0"

# ComfyUI Server
comfyui:
  url: "http://127.0.0.1:8188"
  client_id: "ai_director"

# LLM Configuration — switch providers by changing "provider"
llm:
  provider: "gemini"          # "ollama" | "gemini"
  
  ollama:
    url: "http://127.0.0.1:11434"
    model: "qwen2.5:7b"       # Text model for intent analysis & chat
    vision_model: "llava"     # Vision model for image analysis
  
  gemini:
    api_key: "AIzaSyDCJyXFZkG6oEHNGXXlNs0u483Zr4-mGmo"               # Add your Gemini API key here
    model: "gemini-2.5-flash"

# Model directories
loras_dir: "C:\\Users\\Grappiedit\\Documents\\ComfyUI\\models\\loras"

# Default generation settings
defaults:
  steps: 30
  cfg: 7.0
  sampler: "dpmpp_2m_sde"
  scheduler: "karras"
  width: 1024
  height: 1024
  upscale_factor: 2.0
  ckpt: "Juggernaut-XL_v9_RunDiffusion.safetensors"
  controlnet_model: "thibaud_xl_openpose_256lora.safetensors"

# Pipeline Settings
pipeline:
  max_retries: 2
  quality_threshold: 6.0
  auto_upscale: false
  auto_face_fix: true

# Cache Settings
cache:
  enabled: true
  ttl_seconds: 3600
  max_entries: 100
